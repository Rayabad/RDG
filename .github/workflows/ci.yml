name: Production Material Matrix Integration Lab

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  run-test-suite:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository Code
        uses: actions/checkout@v4

      - name: Set up Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install Enterprise Analytics Core Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install fastapi uvicorn pydantic sqlmodel aiosqlite httpx pytest pytest-asyncio sqlalchemy

      - name: Execute Async Matrix Calculus Suite
        run: |
          pytest test_app.py -v
